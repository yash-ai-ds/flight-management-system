{% extends 'base.html' %}
{% block content %}
<h2>Update Flight Details for {{ flight.flight_number }}</h2>
<form action="{{ url_for('update_flight', flight_number=flight.flight_number) }}" method="POST" style="max-width: 500px; margin-top: 20px;">
    
    <!-- Provide pre-existing values populated into value parameters -->
    <div class="form-group">
        <label>Source Airport</label>
        <select name="source" required>
            {% for city in ['Delhi', 'Mumbai', 'Bangalore', 'Chennai', 'Kolkata', 'Hyderabad', 'Pune', 'Ahmedabad', 'Jaipur', 'Lucknow', 'Chandigarh', 'Surat', 'Kochi', 'Goa', 'Indore'] %}
                <option value="{{ city }}" {% if flight.source == city %}selected{% endif %}>{{ city }}</option>
            {% endfor %}
        </select>
    </div>
    
    <div class="form-group">
        <label>Destination Airport</label>
        <select name="destination" required>
            {% for city in ['Delhi', 'Mumbai', 'Bangalore', 'Chennai', 'Kolkata', 'Hyderabad', 'Pune', 'Ahmedabad', 'Jaipur', 'Lucknow', 'Chandigarh', 'Surat', 'Kochi', 'Goa', 'Indore'] %}
                <option value="{{ city }}" {% if flight.destination == city %}selected{% endif %}>{{ city }}</option>
            {% endfor %}
        </select>
    </div>
    
    <div class="form-group">
        <label>Departure Date</label>
        <input type="date" name="departure_date" value="{{ flight.departure_date }}" required>
    </div>
    
    <div class="form-group">
        <label>Departure Time</label>
        <input type="time" name="departure_time" value="{{ flight.departure_time }}" required>
    </div>
    
    <div class="form-group">
        <label>Price (₹ INR)</label>
        <input type="number" step="0.01" name="price" value="{{ flight.price }}" required>
    </div>
    
    <button type="submit" class="btn">Confirm Updates</button>

</form>
{% endblock %}
