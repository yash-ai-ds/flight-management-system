{% extends 'base.html' %}
{% block content %}
<h2>Add a New Flight</h2>
<form action="{{ url_for('add_flight') }}" method="POST" style="max-width: 500px; margin-top: 20px;">
    
    <div class="form-group">
        <label>Flight Number (e.g. FL250)</label>
        <input type="text" name="flight_number" required>
    </div>
    
    <div class="form-group">
        <label>Source Airport</label>
        <select name="source" required>
            <option value="" disabled selected>Select Source</option>
            <option value="Delhi">Delhi</option>
            <option value="Mumbai">Mumbai</option>
            <option value="Bangalore">Bangalore</option>
            <option value="Chennai">Chennai</option>
            <option value="Kolkata">Kolkata</option>
            <option value="Hyderabad">Hyderabad</option>
            <option value="Pune">Pune</option>
            <option value="Ahmedabad">Ahmedabad</option>
            <option value="Jaipur">Jaipur</option>
            <option value="Lucknow">Lucknow</option>
            <option value="Chandigarh">Chandigarh</option>
            <option value="Surat">Surat</option>
            <option value="Kochi">Kochi</option>
            <option value="Goa">Goa</option>
            <option value="Indore">Indore</option>
        </select>
    </div>
    
    <div class="form-group">
        <label>Destination Airport</label>
        <select name="destination" required>
            <option value="" disabled selected>Select Destination</option>
            <option value="Delhi">Delhi</option>
            <option value="Mumbai">Mumbai</option>
            <option value="Bangalore">Bangalore</option>
            <option value="Chennai">Chennai</option>
            <option value="Kolkata">Kolkata</option>
            <option value="Hyderabad">Hyderabad</option>
            <option value="Pune">Pune</option>
            <option value="Ahmedabad">Ahmedabad</option>
            <option value="Jaipur">Jaipur</option>
            <option value="Lucknow">Lucknow</option>
            <option value="Chandigarh">Chandigarh</option>
            <option value="Surat">Surat</option>
            <option value="Kochi">Kochi</option>
            <option value="Goa">Goa</option>
            <option value="Indore">Indore</option>
        </select>
    </div>
    
    <div class="form-group">
        <label>Departure Date</label>
        <input type="date" name="departure_date" required>
    </div>
    
    <div class="form-group">
        <label>Departure Time</label>
        <!-- Use browser native time picker input structure -->
        <input type="time" name="departure_time" required>
    </div>
    
    <div class="form-group">
        <label>Price (₹ INR)</label>
        <!-- Specify step to allow monetary decimals -->
        <input type="number" step="0.01" name="price" required>
    </div>
    
    <button type="submit" class="btn">Add Flight to Database</button>

</form>
{% endblock %}
